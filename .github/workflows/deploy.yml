name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # se ejecuta en cada push a main
  workflow_dispatch:  # también permite ejecutarlo manualmente desde GitHub

# Permisos requeridos por el action de GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues concurrentes; el en curso termina antes de iniciar uno nuevo
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Construir aplicación
        working-directory: frontend
        run: npm run build
        # La variable BASE_URL la inyecta Vite desde vite.config.js (base: '/COIPO_ENTREGA_PLANTA/')

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
